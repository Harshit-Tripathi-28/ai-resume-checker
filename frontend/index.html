<!DOCTYPE html>
<html>
<head>
  <title>AI Resume Matcher</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    input, textarea {
      width: 100%;
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    textarea {
      height: 80px;
      resize: none;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5a67d8;
    }

    .result-box {
      margin-top: 20px;
      padding: 15px;
      background: #f3f4f6;
      border-radius: 8px;
      font-weight: bold;
      color: #333;
    }

    .score {
      font-size: 22px;
      color: #4CAF50;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>AI Resume Matcher</h2>

    <input type="file" id="resume">
    <textarea id="jobDesc" placeholder="Paste Job Description"></textarea>
    <button onclick="matchResume()">Check Match</button>

    <div class="result-box" id="resultBox" style="display:none;">
      Match Score:
      <div class="score" id="result"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
